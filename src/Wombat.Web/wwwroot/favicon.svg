  <circle cx="42" cy="23" r="5.6" fill="#ffffff"/>
  <circle cx="22" cy="23.5" r="2.1" fill="#2d6cdf"/>
  <circle cx="42" cy="23.5" r="2.1" fill="#2d6cdf"/>
  <!-- head -->
  <ellipse cx="32" cy="33" rx="14" ry="12.5" fill="#ffffff"/>
  <!-- eyes -->
  <circle cx="26" cy="31.5" r="2" fill="#16335a"/>
  <circle cx="38" cy="31.5" r="2" fill="#16335a"/>
  <!-- nose -->
