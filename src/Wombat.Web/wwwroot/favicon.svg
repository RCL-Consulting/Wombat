<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Wombat">
  <defs>
    <linearGradient id="wm-g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2d6cdf"/>
      <stop offset="1" stop-color="#16335a"/>
    </linearGradient>
    <clipPath id="wm-c"><circle cx="32" cy="32" r="29"/></clipPath>
  </defs>
  <g clip-path="url(#wm-c)">
